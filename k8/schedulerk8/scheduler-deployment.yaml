apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler
        image: ajaygaur0103/scheduler:latest
        envFrom:
        - configMapRef:
            name: scheduler-config
        - secretRef:
            name: scheduler-secret
