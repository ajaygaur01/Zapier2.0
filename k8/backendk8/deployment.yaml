apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend-deployment
spec:
    replicas: 2
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            containers:
            -   name: backend
                image: ajaygaur0103/primarybackend:latest
                envFrom:
                -   configMapRef:
                        name: backend-config
                -   secretRef:
                        name: backend-secret
                ports:
                -   containerPort: 3000
                resources:
                    requests:
                        cpu: "100m"
                        memory: "128Mi"
                    limits:
                        cpu: "500m"
                        memory: "512Mi"