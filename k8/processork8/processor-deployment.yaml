apiVersion: apps/v1
kind: Deployment
metadata:
     name: processor-deployment
spec:
    replicas: 2
    selector:
        matchLabels:
            app: processor
    template:
        metadata:
            labels:
                app: processor
        spec:
            containers:
            -   name: processor
                image: ajaygaur0103/processor:latest
                envFrom:
                -   configMapRef:
                        name: processor-config
                -   secretRef:
                        name: processor-secret
  