apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ajaygaur0103/worker:latest
        envFrom:
        - configMapRef:
            name: worker-config
        - secretRef:
            name: worker-secret
