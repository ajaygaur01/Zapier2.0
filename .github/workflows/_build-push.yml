name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      path:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create Sonar Properties
        run: |
          echo "sonar.projectKey=ajaygaur01_Zapier2.0_${{ inputs.service }}" > ${{ inputs.path }}/sonar-project.properties
          echo "sonar.organization=ajaygaur01" >> ${{ inputs.path }}/sonar-project.properties
          echo "sonar.sources=." >> ${{ inputs.path }}/sonar-project.properties
          echo "--- Created sonar-project.properties in ${{ inputs.path }} ---"
          cat ${{ inputs.path }}/sonar-project.properties
          ls -la ${{ inputs.path }}/sonar-project.properties

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.path }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "ajaygaur0103" --password-stdin

      - name: Build Image
        run: |
          docker build \
            -t "ajaygaur0103/${{ inputs.service }}:latest" \
            -f "${{ inputs.path }}/Dockerfile" \
            .

      - name: Push Image
        run: |
          docker push "ajaygaur0103/${{ inputs.service }}:latest"